<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanesa & Gustavo - ¡Nos Casamos!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #2a4d8f; --bg-cream: #f9f7f2; }
        body { margin: 0; padding: 0; background-color: var(--bg-cream); font-family: 'Quicksand', sans-serif; color: var(--primary-blue); display: flex; justify-content: center; }
        .container { max-width: 500px; width: 90%; text-align: center; padding: 40px 20px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin: 0; }
        .details { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; margin-top: 20px; }
        form { border: 2px solid var(--primary-blue); padding: 25px; border-radius: 20px; background: white; box-shadow: 6px 6px 0px var(--primary-blue); }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1.5px solid var(--primary-blue); border-radius: 10px; font-family: inherit; }
        .btn-add { background: none; border: 2px dashed var(--primary-blue); color: var(--primary-blue); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; width: 100%; }
        .btn-remove { background: #ffeded; color: #cc0000; border: 1.5px solid #cc0000; border-radius: 10px; padding: 0 12px; cursor: pointer; }
        .checkbox-group { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .counter-box { background: #eef2f9; padding: 12px; border-radius: 12px; margin: 15px 0; font-weight: bold; border: 1px dashed var(--primary-blue); }
        button[type="submit"] { background-color: var(--primary-blue); color: white; border: none; padding: 14px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        #successMessage { display: none; padding: 40px 20px; background: white; border-radius: 20px; border: 2px solid #4CAF50; }
        hr { border: none; border-top: 1px dashed var(--primary-blue); margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="mainContent">
        <h1>Vanesa & Gustavo</h1>
        <div class="details">
            <p><strong>Civil:</strong> Viernes 15 de mayo, 10:50 AM<br>Jardín Japonés</p>
            <p><strong>Recepción:</strong> Morón 2544, CABA</p>
        </div>

        <form id="weddingForm" action="https://formspree.io/f/mqegngww" method="POST">
            <div class="form-group">
                <label>Nombres de los asistentes:</label>
                <div id="guestContainer">
                    <div class="input-row">
                        <input type="text" name="nombre_1" placeholder="Tu nombre completo" required>
                    </div>
                </div>
                <button type="button" class="btn-add" id="btnAddGuest">+ Agregar acompañante</button>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="transport" name="necesita_transporte">
                <label for="transport">¿Necesitan transporte?</label>
            </div>

            <div id="counterBox" class="counter-box" style="display: none;">
                Total: <span id="countNumber">1</span> <span id="guestText">Invitado</span> para transporte
            </div>

            <input type="hidden" id="hiddenCount" name="cantidad_transporte" value="0">

            <button type="submit" id="submitBtn">Confirmar Asistencia</button>
        </form>
    </div>

    <div id="successMessage">
        <h2 style="color: #4CAF50;">¡Confirmado!</h2>
        <p>Gracias por acompañarnos. ¡Nos vemos pronto!</p>
    </div>
</div>

<script>
    const guestContainer = document.getElementById('guestContainer');
    const btnAddGuest = document.getElementById('btnAddGuest');
    const transportCheck = document.getElementById('transport');
    const counterBox = document.getElementById('counterBox');
    const countNumber = document.getElementById('countNumber');
    const guestText = document.getElementById('guestText');
    const hiddenCount = document.getElementById('hiddenCount');
    let guestCount = 1;

    function updateSummary() {
        countNumber.textContent = guestCount;
        guestText.textContent = guestCount === 1 ? "Invitado" : "Invitados";
        
        // Si el checkbox está marcado, actualizamos el valor oculto con el número real
        if (transportCheck.checked) {
            hiddenCount.value = guestCount;
        } else {
            hiddenCount.value = "0";
        }
    }

    btnAddGuest.addEventListener('click', () => {
        guestCount++;
        const row = document.createElement('div');
        row.className = 'input-row';
        row.innerHTML = `
            <input type="text" name="nombre_${guestCount}" placeholder="Nombre del acompañante" required>
            <button type="button" class="btn-remove">✕</button>
        `;
        guestContainer.appendChild(row);
        
        row.querySelector('.btn-remove').addEventListener('click', () => {
            row.remove();
            guestCount--;
            updateSummary();
        });
        updateSummary();
    });

    transportCheck.addEventListener('change', () => {
        counterBox.style.display = transportCheck.checked ? 'block' : 'none';
        updateSummary();
    });

    const form = document.getElementById('weddingForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        updateSummary(); // Forzamos conteo antes de enviar

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = "Enviando...";

        const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        } else {
            alert('Error al enviar. Intenta de nuevo.');
            btn.disabled = false; btn.textContent = "Confirmar Asistencia";
        }
    };
</script>

</body>
</html>
